<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张氏族谱世系图</title>
    <style>
        :root {
            --line-color: #e60012;
            --text-color: #333;
            --bg-color: #ffffff;
        }

        body {
            font-family: "Microsoft YaHei", "SimSun", serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        /* 顶部大标题 */
        .main-title {
            color: #e60012;
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        .sub-title {
            font-size: 24px;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        /* 族谱容器 */
        .tree-container {
            background: var(--bg-color);
            padding: 50px;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            min-width: 800px;
        }

        /* 每一层（世）的容器 */
        .family-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 成员盒子 */
        .member {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 15px;
            position: relative;
            z-index: 2;
        }

        /* 姓名横排 */
        .name {
            font-size: 18px;
            font-weight: bold;
            color: #000;
            white-space: nowrap;
            margin-bottom: 2px;
        }

        /* 妻子放在下面 */
        .spouse {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
        }

        /* 子女容器 */
        .children {
            display: flex;
            justify-content: center;
            margin-top: 40px; /* 连线预留空间 */
            position: relative;
        }

        /* --- 连线逻辑 --- */
        
        /* 向下的总干线 */
        .member::after {
            content: "";
            position: absolute;
            bottom: -40px;
            left: 50%;
            width: 2px;
            height: 40px;
            background-color: var(--line-color);
        }

        /* 如果没有孩子，不显示下划线 */
        .no-child::after { display: none; }

        /* 横向分布线 */
        .children::before {
            content: "";
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 30px);
            height: 2px;
            background-color: var(--line-color);
        }

        /* 单个孩子的垂直连接线 */
        .child-item {
            position: relative;
            padding-top: 0;
        }

        .child-item::before {
            content: "";
            position: absolute;
            top: -40px;
            left: 50%;
            width: 2px;
            height: 20px;
            background-color: var(--line-color);
        }

        /* 排行文字标注 */
        .rank {
            position: absolute;
            top: -42px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            font-size: 11px;
            color: #e60012;
            padding: 0 2px;
            white-space: nowrap;
            z-index: 3;
        }

        /* 左侧世代标注 */
        .gen-label {
            position: absolute;
            left: -80px;
            top: 10px;
            font-weight: bold;
            color: #333;
            border: 1px solid #333;
            padding: 2px 5px;
        }
    </style>
</head>
<body>

    <div class="main-title">专业族谱定制</div>
    <div class="sub-title">张氏族谱世系图</div>

    <div class="tree-container">
        
        <div class="family-group">
            <div class="gen-label">一世</div>
            <div class="member">
                <div class="name">张会山</div>
                <div class="spouse">李英富、王氏</div>
            </div>

            <div class="children">
                <div class="child-item">
                    <span class="rank">长子</span>
                    <div class="family-group">
                        <div class="gen-label">二世</div>
                        <div class="member">
                            <div class="name">张金元</div>
                            <div class="spouse">陈登英</div>
                        </div>
                        
                        <div class="children">
                            <div class="child-item">
                                <span class="rank">长子</span>
                                <div class="member">
                                    <div class="name">张庆国</div>
                                    <div class="spouse">任氏、李氏</div>
                                </div>
                            </div>
                            <div class="child-item">
                                <span class="rank">次子</span>
                                <div class="member no-child">
                                    <div class="name">张庆祝</div>
                                    <div class="spouse">杨氏</div>
                                </div>
                            </div>
                            <div class="child-item">
                                <span class="rank">三子</span>
                                <div class="member no-child">
                                    <div class="name">张庆铃</div>
                                    <div class="spouse">鲁氏</div>
                                </div>
                            </div>
                            <div class="child-item">
                                <span class="rank">四子</span>
                                <div class="member">
                                    <div class="name">张庆广</div>
                                    <div class="spouse">霓氏</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="child-item">
                    <span class="rank">次子</span>
                    <div class="family-group">
                        <div class="member">
                            <div class="name">张申元</div>
                            <div class="spouse">刘氏</div>
                        </div>
                        <div class="children">
                            <div class="child-item">
                                <span class="rank">长子</span>
                                <div class="member">
                                    <div class="name">张庆方</div>
                                    <div class="spouse">刘丽香</div>
                                </div>
                            </div>
                            <div class="child-item">
                                <span class="rank">长女</span>
                                <div class="member no-child">
                                    <div class="name">张晓彤</div>
                                    <div class="spouse">李秉义</div>
                                </div>
                            </div>
                            <div class="child-item">
                                <span class="rank">次子</span>
                                <div class="member no-child">
                                    <div class="name">张庆武</div>
                                    <div class="spouse">郑氏</div>
                                </div>
                            </div>
                            <div class="child-item">
                                <span class="rank">次女</span>
                                <div class="member no-child">
                                    <div class="name">张晓虹</div>
                                    <div class="spouse">周秉琨</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <p style="margin-top: 40px; color: #999; font-size: 14px;">注：由于篇幅限制，代码仅展示前三世及主要分支逻辑。您可参照格式继续向下添加 div 节点。</p>

</body>
</html>
